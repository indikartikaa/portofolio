<section id="education" class="py-16 md:py-24 relative">
  <div class="max-w-[1140px] md:max-w-[1320px] mx-auto px-6">
    
    <!-- Section Header -->
    <div class="flex items-center gap-3 text-[11px] md:text-[12px] tracking-widest uppercase text-sage-d font-bold mb-10 md:mb-14 reveal">
      <span class="w-12 h-[2px] bg-sage-m"></span> EDUCATION
    </div>

    <!-- Container Timeline -->
    <div class="max-w-[850px] flex flex-col gap-10 md:gap-14">
      
      <!-- Education Item 1: UPN -->
      <div class="flex gap-6 md:gap-8 relative reveal group">
        <!-- Timeline Line (Menyala saat di-hover) -->
        <div class="absolute left-[31px] md:left-[35px] top-[75px] bottom-[-50px] w-[2px] bg-brd dark:bg-brd-dark group-hover:bg-sage-m transition-colors duration-300"></div>
        
        <!-- Logo -->
        <div class="w-16 h-16 md:w-18 md:h-18 shrink-0 rounded-2xl bg-white dark:bg-card-dark border-2 border-sage-m dark:border-sage-d/50 flex items-center justify-center p-2 z-10 shadow-md group-hover:scale-105 transition-transform duration-300">
          <img src="images/logo-upn.png" alt="UPN Veteran Jawa Timur" onerror="this.style.display='none'" class="w-full h-full object-contain">
        </div>
        
        <!-- Content -->
        <div class="pt-1 md:pt-2 w-full">
          <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-2">
            <h4 class="font-serif text-[20px] md:text-[24px] font-bold text-txt dark:text-txt-dark leading-tight">Bachelor of Information Systems</h4>
            <span class="text-[12px] md:text-[13px] font-bold text-sage-d mt-2 md:mt-0 bg-sage-l dark:bg-sage-d/20 px-3 py-1 rounded-full w-fit">2024 — Present</span>
          </div>
          <div class="text-[14px] md:text-[15px] font-semibold text-muted dark:text-muted-dark mb-4">Universitas Pembangunan Nasional "Veteran" Jawa Timur</div>
          
          <!-- GPA Badge -->
          <div class="inline-flex items-center gap-2 bg-themebg dark:bg-themebg-dark border border-brd dark:border-brd-dark px-4 py-2 rounded-xl shadow-sm hover:border-sage-m transition-colors">
            <i data-lucide="award" class="w-4 h-4 text-sage-d"></i>
            <span class="text-[13px] md:text-[14px] font-bold text-txt dark:text-txt-dark">GPA: 3.90 / 4.00</span>
          </div>
        </div>
      </div>

      <!-- Education Item 2: SMAN 1 Waru -->
      <div class="flex gap-6 md:gap-8 relative reveal group">
        <!-- Logo -->
        <div class="w-16 h-16 md:w-18 md:h-18 shrink-0 rounded-2xl bg-white dark:bg-card-dark border-2 border-brd dark:border-brd-dark flex items-center justify-center p-2 z-10 shadow-sm group-hover:border-sage-m transition-colors duration-300">
          <img src="images/logo-sman1waru.png" alt="SMAN 1 Waru" onerror="this.style.display='none'" class="w-full h-full object-contain">
        </div>
        
        <!-- Content -->
        <div class="pt-1 md:pt-2 w-full">
          <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-2">
            <h4 class="font-serif text-[20px] md:text-[24px] font-bold text-txt dark:text-txt-dark leading-tight">Science Major (MIPA)</h4>
            <span class="text-[12px] md:text-[13px] font-bold text-muted dark:text-muted-dark mt-2 md:mt-0 border border-brd dark:border-brd-dark px-3 py-1 rounded-full w-fit">2021 — 2024</span>
          </div>
          <div class="text-[14px] md:text-[15px] font-semibold text-muted dark:text-muted-dark mb-4">SMA Negeri 1 Waru, Sidoarjo</div>
          
          <!-- Score Badge -->
          <div class="inline-flex items-center gap-2 bg-themebg dark:bg-themebg-dark border border-brd dark:border-brd-dark px-4 py-2 rounded-xl shadow-sm hover:border-sage-m transition-colors">
            <i data-lucide="star" class="w-4 h-4 text-sage-d"></i>
            <span class="text-[13px] md:text-[14px] font-bold text-txt dark:text-txt-dark">Average Score: 90.22</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
