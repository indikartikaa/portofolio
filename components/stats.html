<section class="py-10 md:py-14 border-y border-brd dark:border-brd-dark bg-sage-l/40 dark:bg-sage-d/5">
  <div class="max-w-[1140px] md:max-w-[1320px] mx-auto px-6">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8">

      <div class="reveal text-center">
        <div class="stat-number font-serif text-[32px] md:text-[44px] font-bold text-sage-d leading-tight" data-target="8" data-suffix="+">0</div>
        <div class="text-[11px] md:text-[13px] text-muted dark:text-muted-dark font-medium tracking-wide mt-1">Projects Delivered</div>
      </div>

      <div class="reveal text-center delay-75">
        <div class="stat-number font-serif text-[32px] md:text-[44px] font-bold text-sage-d leading-tight" data-target="10" data-suffix="">0</div>
        <div class="text-[11px] md:text-[13px] text-muted dark:text-muted-dark font-medium tracking-wide mt-1">Certifications</div>
      </div>

      <div class="reveal text-center delay-150">
        <div class="stat-number font-serif text-[32px] md:text-[44px] font-bold text-sage-d leading-tight" data-target="2" data-suffix="">0</div>
        <div class="text-[11px] md:text-[13px] text-muted dark:text-muted-dark font-medium tracking-wide mt-1">Published Papers</div>
      </div>

      <div class="reveal text-center delay-200">
        <div class="stat-number font-serif text-[32px] md:text-[44px] font-bold text-sage-d leading-tight" data-decimal="3.79" data-suffix="">0.00</div>
        <div class="text-[11px] md:text-[13px] text-muted dark:text-muted-dark font-medium tracking-wide mt-1">GPA / IPK</div>
      </div>

    </div>
  </div>
</section>
